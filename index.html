  <header class="top noPrint">
    <div class="wrap">
      <div class="brand">
        <div class="mark"><i data-lucide="calendar-clock"></i></div>
        <div><h1 data-i18n="appTitle"></h1><p id="periodLabel"></p></div>

      <button id="clearBtn" class="btn danger"><i data-lucide="eraser"></i><span data-i18n="clear"></span></button>

  </section>

      <div id="quickStart" class="quickStart">

          <button id="emptyLoadBtn" class="btn primary"><i data-lucide="folder-open"></i><span data-i18n="loadReport"></span></button>
          <button id="emptyMonthBtn" class="btn"><i data-lucide="calendar-plus"></i><span data-i18n="openMonth"></span></button>
        </div>
      </div>
      <div class="previewBox"><img src="social-preview.jpg?v=3" alt="Attendance system preview"></div>
    </section>
    <section class="kpis">
      <article class="kpi"><span data-i18n="monthTotal"></span><strong id="monthTotal">00:00</strong></article>
      <article class="kpi"><span data-i18n="reportedDays"></span><strong id="reportedDays">0</strong></article>

      <section class="panel">
        <div class="head"><h2 data-i18n="dailyReport"></h2><button id="addTodayBtn" class="btn"><i data-lucide="plus"></i><span data-i18n="todayIn"></span></button></div>

      </section>
      <aside class="side">
        <section class="panel"><div class="head"><h2 data-i18n="summary"></h2></div><ul class="list"><li><span data-i18n="period"></span><strong id="summaryPeriod">-</strong></li><li><span data-i18n="daysInMonth"></span><strong id="summaryDays">0</strong></li><li><span data-i18n="workDays"></span><strong id="summaryReported">0</strong></li><li><span data-i18n="completeRows"></span><strong id="summaryComplete">0</strong></li><li><span data-i18n="missingRows"></span><strong id="summaryPartial">0</strong></li></ul></section>

      </aside>
    </section>
  </main>
  <section id="printReport" class="printReport"></section>
  <input id="fileInput" class="hiddenfile" type="file" accept=".xlsx,.xls">
  <div id="toast" class="toast noPrint" role="status"></div>

function applyLang(){document.documentElement.lang=state.lang;document.documentElement.dir=tr("dir");e.langSelect.value=state.lang;document.querySelectorAll("[data-i18n]").forEach(n=>n.textContent=tr(n.dataset.i18n));e.employeeName.placeholder=tr("fullName");document.querySelectorAll(".timeInput").forEach(i=>i.placeholder=tr("timeHint"))}
function render(){applyLang();e.monthInput.value=state.month||"";e.employeeName.value=state.employeeName||"";e.periodLabel.textContent=monthName(state.month);e.quickStart.hidden=!!state.month;e.reportArea.hidden=!state.month;const s=stats();e.monthTotal.textContent=fmt(s.total);e.reportedDays.textContent=s.reported;e.entryCount.textContent=s.entries;e.avgDay.textContent=fmt(s.reported?Math.round(s.total/s.reported):0);e.summaryPeriod.textContent=state.month||"-";e.summaryDays.textContent=s.daysInMonth;e.summaryReported.textContent=s.reported;e.summaryComplete.textContent=s.complete;e.summaryPartial.textContent=s.partial;e.fileNameLabel.textContent=fileName();e.lastSaved.textContent=state.lastSaved||"-";renderDays();if(window.lucide)lucide.createIcons()}
function renderDays(){e.daysBody.innerHTML="";if(!state.month)return;const today=todayKey();dates(state.month).forEach(d=>{const day=ensureDay(d.key),s=dayStats(day),trEl=document.createElement("tr");if(d.weekend)trEl.classList.add("weekend");if(d.key===today)trEl.classList.add("today");const tdDate=document.createElement("td");tdDate.dataset.label=tr("date");tdDate.innerHTML=`<div class="date">${d.label}</div><div class="sub">${d.dayName}</div>`;const tdEntries=document.createElement("td"),wrap=document.createElement("div");tdEntries.dataset.label=tr("entries");wrap.className="entries";day.entries.forEach((x,i)=>wrap.appendChild(entryRow(d.key,x,i)));const add=document.createElement("button");add.className="btn";add.type="button";add.innerHTML=`<i data-lucide="plus"></i>${tr("addEntry")}`;add.onclick=()=>addEntry(d.key);wrap.appendChild(add);tdEntries.appendChild(wrap);const tdTotal=document.createElement("td");tdTotal.dataset.label=tr("dayTotal");tdTotal.innerHTML=`<span class="pill total">${fmt(s.total)}</span>`;const tdStatus=document.createElement("td"),pill=document.createElement("span");tdStatus.dataset.label=tr("status");pill.className="pill "+(s.partial?"partial":s.complete?"done":"empty");pill.textContent=s.partial?tr("missing"):s.complete?tr("ok"):tr("empty");tdStatus.appendChild(pill);const tdNote=document.createElement("td"),note=document.createElement("input");tdNote.dataset.label=tr("notes");note.type="text";note.className="note";note.placeholder=tr("note");note.value=day.note||"";note.oninput=ev=>{ensureDay(d.key).note=ev.target.value;draft()};tdNote.appendChild(note);trEl.append(tdDate,tdEntries,tdTotal,tdStatus,tdNote);e.daysBody.appendChild(trEl)})}
function entryRow(key,x,i){const row=document.createElement("div");row.className="entry";const a=document.createElement("input"),b=document.createElement("input"),d=document.createElement("div"),del=document.createElement("button");[a,b].forEach(inp=>{inp.type="text";inp.inputMode="numeric";inp.maxLength=5;inp.className="timeInput";inp.placeholder=tr("timeHint")});a.value=x.in||"";b.value=x.out||"";a.ariaLabel=tr("inTime");b.ariaLabel=tr("outTime");a.oninput=ev=>smartTimeInput(ev,key,i,"in",b);b.oninput=ev=>smartTimeInput(ev,key,i,"out",null);a.onblur=ev=>commitTime(ev,key,i,"in");b.onblur=ev=>commitTime(ev,key,i,"out");const n=entryMin(x);d.className="dur"+(n===null&&(x.in||x.out)?" bad":"");d.textContent=n===null?"--:--":fmt(n);del.className="iconbtn danger";del.title=tr("deleteRow");del.innerHTML='<i data-lucide="trash-2"></i>';del.onclick=()=>removeEntry(key,i);row.append(a,b,d,del);return row}
function smartTimeInput(ev,key,i,field,next){let v=ev.target.value.replace(/[^\d:]/g,"");ev.target.value=v;if(/^\d{4}$/.test(v)){v=normalizeTime(v);ev.target.value=v;ensureDay(key).entries[i][field]=v;draft();if(next){next.focus();return}render();return}ensureDay(key).entries[i][field]=v;draft()}
function commitTime(ev,key,i,field){const n=normalizeTime(ev.target.value);ensureDay(key).entries[i][field]=n;draft();render()}
function setMonth(month){if(!month){toast(tr("chooseMonth"));return}state.month=month;state.days={};state.lastSaved="";dates(month).forEach(({key})=>ensureDay(key));draft();render()}function addEntry(key,v={in:"",out:""}){ensureDay(key).entries.push({in:v.in||"",out:v.out||""});draft();render()}function updateEntry(key,i,field,value){ensureDay(key).entries[i][field]=value;draft();render()}function removeEntry(key,i){ensureDay(key).entries.splice(i,1);draft();render()}function addToday(){const key=todayKey();if(!state.month||!key.startsWith(state.month)){toast(tr("outsideMonth"));return}const d=new Date();addEntry(key,{in:`${pad(d.getHours())}:${pad(d.getMinutes())}`,out:""})}
function reportRows(){const rows=[];dates(state.month).forEach(d=>{const day=ensureDay(d.key),s=dayStats(day);if(!day.entries.length){rows.push({[tr("date")]:d.label,[tr("dayTotal")]:fmt(s.total),[tr("notes")]:day.note||""});return}day.entries.forEach((x,i)=>{const n=entryMin(x);rows.push({[tr("date")]:i?"":d.label,[tr("entries")]:`${x.in||""} - ${x.out||""}`,[tr("dayTotal")]:i?"":fmt(s.total),[tr("notes")]:i?"":day.note||""})})});return rows}function dataRows(){const rows=[];dates(state.month).forEach(({key})=>{const day=ensureDay(key);if(!day.entries.length){rows.push({date:key,in:"",out:"",note:day.note||""});return}day.entries.forEach((x,i)=>rows.push({date:key,in:normalizeTime(x.in)||"",out:normalizeTime(x.out)||"",note:i?"":day.note||""}))});return rows}
function workbook(){const s=stats(),wb=XLSX.utils.book_new();wb.Props={Title:"Monthly Attendance Report",Subject:state.month,Author:"Attendance System",CreatedDate:new Date()};const rep=XLSX.utils.json_to_sheet(reportRows());rep["!cols"]=[{wch:14},{wch:22},{wch:12},{wch:30}];XLSX.utils.book_append_sheet(wb,rep,tr("dailyReport"));const sum=XLSX.utils.aoa_to_sheet([[tr("employee"),state.employeeName||""],[tr("monthLabel"),state.month],[tr("monthTotal"),fmt(s.total)],[tr("reportedDays"),s.reported],[tr("entryCount"),s.entries],[tr("completeRows"),s.complete],[tr("version"),APP_VERSION]]);sum["!cols"]=[{wch:22},{wch:24}];XLSX.utils.book_append_sheet(wb,sum,tr("summary"));const data=XLSX.utils.json_to_sheet([{meta:"month",value:state.month},{meta:"employeeName",value:state.employeeName||""},{meta:"lang",value:state.lang},...dataRows()]);XLSX.utils.book_append_sheet(wb,data,"Data");wb.Workbook={Sheets:[{name:tr("dailyReport")},{name:tr("summary")},{name:"Data",Hidden:1}]};return wb}
async function save(){if(!state.month){toast(tr("saveFirst"));return}const blob=new Blob([XLSX.write(workbook(),{bookType:"xlsx",type:"array"})],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});if(window.showSaveFilePicker){try{const h=await showSaveFilePicker({suggestedName:fileName(),types:[{description:"Excel Workbook",accept:{"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet":[".xlsx"]}}]});const w=await h.createWritable();await w.write(blob);await w.close()}catch(err){if(err.name==="AbortError")return;download(blob)}}else download(blob);state.lastSaved=new Intl.DateTimeFormat(tr("locale"),{dateStyle:"short",timeStyle:"short"}).format(new Date());draft();render();toast(tr("saved"))}function download(blob){const url=URL.createObjectURL(blob),a=document.createElement("a");a.href=url;a.download=fileName();document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url)}
async function load(file){const wb=XLSX.read(await file.arrayBuffer(),{type:"array"}),sheet=wb.Sheets.Data||wb.Sheets["Data"];if(!sheet){toast(tr("badFile"));return}const rows=XLSX.utils.sheet_to_json(sheet,{defval:""}),meta=rows.find(r=>r.meta==="month"),employee=rows.find(r=>r.meta==="employeeName"),lang=rows.find(r=>r.meta==="lang");if(!meta?.value){toast(tr("noMonthInFile"));return}state.month=String(meta.value);state.employeeName=employee?.value?String(employee.value):"";if(lang?.value&&t[lang.value])state.lang=lang.value;state.days={};state.lastSaved="";dates(state.month).forEach(({key})=>ensureDay(key));rows.filter(r=>r.date).forEach(r=>{const day=ensureDay(String(r.date));if(r.note)day.note=String(r.note);if(r.in||r.out)day.entries.push({in:String(r.in||""),out:String(r.out||"")})});draft();render();toast(`${tr("loaded")} ${state.month}`)}
function clearMonth(){if(!state.month)return;if(!confirm(tr("clearConfirm")))return;const m=state.month;state.days={};state.lastSaved="";dates(m).forEach(({key})=>ensureDay(key));draft();render()}
function entryLines(day){if(!day.entries.length)return"";return day.entries.map(x=>{const n=entryMin(x);return `${esc(normalizeTime(x.in)||"--:--")} - ${esc(normalizeTime(x.out)||"--:--")}${n===null?"":` (${fmt(n)})`}`}).join("<br>")}function buildPrintReport(){const s=stats(),employee=state.employeeName||tr("notSpecified");let rows="";dates(state.month).forEach(d=>{const day=ensureDay(d.key),ds=dayStats(day);rows+=`<tr><td>${d.label}</td><td>${d.dayName}</td><td class="entryLines">${entryLines(day)}</td><td class="time">${fmt(ds.total)}</td><td>${esc(day.note||"")}</td></tr>`});e.printReport.innerHTML=`<div class="printHeader"><h1>${tr("reportTitle")} - ${esc(monthName(state.month))}</h1><div class="printMeta"><div><b>${tr("employeePrint")}:</b> ${esc(employee)}</div><div><b>${tr("workMonth")}:</b> ${esc(state.month)}</div><div><b>${tr("generated")}:</b> ${new Intl.DateTimeFormat(tr("locale"),{dateStyle:"short",timeStyle:"short"}).format(new Date())}</div></div></div><table class="printTable"><thead><tr><th style="width:13%">${tr("date")}</th><th style="width:12%">${state.lang==="he"?"יום":"Day"}</th><th style="width:33%">${tr("entries")}</th><th style="width:13%">${tr("dayTotal")}</th><th>${tr("notes")}</th></tr></thead><tbody>${rows}</tbody></table><div class="printSummary"><div><b>${tr("monthTotal")}:</b><br>${fmt(s.total)}</div><div><b>${tr("reportedDays")}:</b><br>${s.reported}</div><div><b>${tr("entryCount")}:</b><br>${s.entries}</div><div><b>${tr("avgDay")}:</b><br>${fmt(s.reported?Math.round(s.total/s.reported):0)}</div></div><div class="signature"><span>${tr("signature")}</span><span>${tr("printDate")}</span></div>`}function printReport(){if(!state.month){toast(tr("printFirst"));return}buildPrintReport();window.print()}
function loadDraft(){try{const raw=localStorage.getItem(STORAGE_KEY);if(raw){const p=JSON.parse(raw);state.month=p.month||"";state.employeeName=p.employeeName||"";state.days=p.days||{};state.lastSaved=p.lastSaved||"";state.lang=t[p.lang]?p.lang:"he"}}catch{localStorage.removeItem(STORAGE_KEY)}if(!state.month)e.monthInput.value=nowMonth();render()}
e.langSelect.onchange=ev=>{state.lang=ev.target.value;draft();render()};e.employeeName.oninput=ev=>{state.employeeName=ev.target.value;draft()};e.newMonthBtn.onclick=()=>setMonth(e.monthInput.value);e.emptyMonthBtn.onclick=()=>{e.monthInput.value=e.monthInput.value||nowMonth();setMonth(e.monthInput.value)};e.loadBtn.onclick=e.emptyLoadBtn.onclick=()=>e.fileInput.click();e.saveBtn.onclick=save;e.printBtn.onclick=printReport;e.clearBtn.onclick=clearMonth;e.addTodayBtn.onclick=addToday;e.fileInput.onchange=ev=>{const[file]=ev.target.files;if(file)load(file);ev.target.value=""};loadDraft();
  </script>
