<body>
  <header class="top noPrint">
    <div class="wrap">
      <div class="brand">
        <div><div class="brandTitle"><h1 data-i18n="appTitle"></h1><span class="betaBadge" data-i18n="beta"></span></div><p id="periodLabel"></p></div>
      </div>
      <div class="topActions">
        <select id="langSelect" class="langSelect" aria-label="Language"><option value="he">עברית</option><option value="en">English</option></select>
        <button id="settingsBtn" class="btn dark"><i data-lucide="palette"></i><span data-i18n="displaySettings"></span></button>
        <button id="aboutBtn" class="btn dark"><span data-i18n="about"></span></button>
        <button id="loadBtn" class="btn dark"><i data-lucide="folder-open"></i><span data-i18n="load"></span></button>
        <button id="printBtn" class="btn dark"><i data-lucide="printer"></i><span data-i18n="print"></span></button>
        <button id="saveBtn" class="btn primary"><i data-lucide="save"></i><span data-i18n="save"></span></button>
      </div>
    </div>
  </header>
  <section class="bar noPrint">
    <div class="wrap">
      <div class="controls">
        <div class="field"><label for="monthInput" data-i18n="monthLabel"></label><input id="monthInput" type="month"></div>
        <button id="newMonthBtn" class="btn"><i data-lucide="calendar-days"></i><span data-i18n="openMonth"></span></button>
        <div class="field"><label for="employeeName" data-i18n="employee"></label><input id="employeeName" type="text"></div>
      </div>
      <button id="clearBtn" class="btn danger"><i data-lucide="eraser"></i><span data-i18n="clear"></span></button>
    </div>
  </section>
  <main class="content noPrint">
    <section class="intro">
      <div id="quickStart" class="quickStart">
        <div><h2 data-i18n="quickTitle"></h2><p data-i18n="quickText"></p></div>
        <div class="row">
          <button id="emptyLoadBtn" class="btn primary"><i data-lucide="folder-open"></i><span data-i18n="loadReport"></span></button>
          <button id="emptyMonthBtn" class="btn"><i data-lucide="calendar-plus"></i><span data-i18n="openMonth"></span></button>
        </div>
      </div>
    </section>
    <section class="kpis">
      <article class="kpi"><span data-i18n="monthTotal"></span><strong id="monthTotal">00:00</strong></article>
      <article class="kpi"><span data-i18n="reportedDays"></span><strong id="reportedDays">0</strong></article>
      <article class="kpi"><span data-i18n="entryCount"></span><strong id="entryCount">0</strong></article>
      <article class="kpi"><span data-i18n="avgDay"></span><strong id="avgDay">00:00</strong></article>
    </section>
    <section id="reportArea" class="grid" hidden>
      <section class="panel">
        <div class="head"><h2 data-i18n="dailyReport"></h2><button id="addTodayBtn" class="btn"><i data-lucide="plus"></i><span data-i18n="todayIn"></span></button></div>
        <div class="tablewrap"><table><thead><tr><th data-i18n="date"></th><th data-i18n="entries"></th><th data-i18n="dayTotal"></th><th data-i18n="status"></th><th data-i18n="notes"></th></tr></thead><tbody id="daysBody"></tbody></table></div>
      </section>
      <aside class="side">
        <section class="panel"><div class="head"><h2 data-i18n="summary"></h2></div><ul class="list"><li><span data-i18n="period"></span><strong id="summaryPeriod">-</strong></li><li><span data-i18n="daysInMonth"></span><strong id="summaryDays">0</strong></li><li><span data-i18n="workDays"></span><strong id="summaryReported">0</strong></li><li><span data-i18n="completeRows"></span><strong id="summaryComplete">0</strong></li><li><span data-i18n="missingRows"></span><strong id="summaryPartial">0</strong></li></ul></section>
        <section class="panel"><div class="head"><h2 data-i18n="file"></h2></div><ul class="list"><li><span data-i18n="suggestedName"></span><strong id="fileNameLabel">attendance.xlsx</strong></li><li><span data-i18n="lastSaved"></span><strong id="lastSaved">-</strong></li></ul></section>
      </aside>
    </section>
  </main>
  <section id="printReport" class="printReport"></section>
  <input id="fileInput" class="hiddenfile" type="file" accept=".xlsx,.xls">
  <div id="toast" class="toast noPrint" role="status"></div>
  <div id="settingsModal" class="modalBackdrop noPrint" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
    <div class="modal">
      <div class="modalHeader"><h2 id="settingsTitle" data-i18n="displaySettings"></h2><button id="settingsCloseBtn" class="iconbtn" type="button" aria-label="Close"><i data-lucide="x"></i></button></div>
      <div class="modalBody">
        <div class="themeOptions" id="themeOptions">
          <button class="themeOption" type="button" data-theme-choice="azure"><span class="swatch azure"></span><span data-i18n="themeAzure"></span></button>
          <button class="themeOption" type="button" data-theme-choice="turquoise"><span class="swatch turquoise"></span><span data-i18n="themeTurquoise"></span></button>
          <button class="themeOption" type="button" data-theme-choice="emerald"><span class="swatch emerald"></span><span data-i18n="themeEmerald"></span></button>
          <button class="themeOption" type="button" data-theme-choice="violet"><span class="swatch violet"></span><span data-i18n="themeViolet"></span></button>
          <button class="themeOption" type="button" data-theme-choice="raspberry"><span class="swatch raspberry"></span><span data-i18n="themeRaspberry"></span></button>
          <button class="themeOption" type="button" data-theme-choice="sunset"><span class="swatch sunset"></span><span data-i18n="themeSunset"></span></button>
        </div>
      </div>
    </div>
  </div>
  <div id="aboutModal" class="modalBackdrop noPrint" role="dialog" aria-modal="true" aria-labelledby="aboutTitle">
    <div class="modal">
      <div class="modalHeader"><h2 id="aboutTitle" data-i18n="aboutTitle"></h2><button id="aboutCloseBtn" class="iconbtn" type="button" aria-label="Close"><i data-lucide="x"></i></button></div>
      <div class="modalBody">
        <div class="aboutMeta">
          <strong data-i18n="appTitle"></strong>
          <span><span data-i18n="version"></span>: <span id="aboutVersion"></span></span>
          <span data-i18n="betaStatus"></span>
        </div>
        <p data-i18n="aboutBetaText"></p>
        <p data-i18n="aboutCredit"></p>
        <p>Aviv Matsa - Smart Information Systems</p>
        <p>© <span id="copyrightYear"></span></p>
      </div>
    </div>
  </div>
  <script>

e.langSelect.onchange=ev=>{state.lang=ev.target.value;draft();render()};e.settingsBtn.onclick=()=>openModal(e.settingsModal);e.settingsCloseBtn.onclick=()=>closeModal(e.settingsModal);e.aboutBtn.onclick=()=>openModal(e.aboutModal);e.aboutCloseBtn.onclick=()=>closeModal(e.aboutModal);[e.settingsModal,e.aboutModal].forEach(m=>m.onclick=ev=>{if(ev.target===m)closeModal(m)});document.addEventListener("keydown",ev=>{if(ev.key==="Escape"){closeModal(e.settingsModal);closeModal(e.aboutModal)}});e.themeOptions.onclick=ev=>{const btn=ev.target.closest("[data-theme-choice]");if(!btn)return;state.theme=normalizeTheme(btn.dataset.themeChoice);draft();applyTheme()};e.employeeName.oninput=ev=>{state.employeeName=ev.target.value;draft()};e.newMonthBtn.onclick=()=>setMonth(e.monthInput.value);e.emptyMonthBtn.onclick=()=>{e.monthInput.value=e.monthInput.value||nowMonth();setMonth(e.monthInput.value)};e.loadBtn.onclick=e.emptyLoadBtn.onclick=()=>e.fileInput.click();e.saveBtn.onclick=save;e.printBtn.onclick=printReport;e.clearBtn.onclick=clearMonth;e.addTodayBtn.onclick=addToday;e.fileInput.onchange=ev=>{const[file]=ev.target.files;if(file)load(file);ev.target.value=""};loadDraft();
  </script>
